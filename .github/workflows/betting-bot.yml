name: Betting Bot - EV+ Analysis

on:
  schedule:
    # 2 ejecuciones diarias (ahorra créditos: 8 créditos × 2 = 16/día × 30 = 480/500)
    # 10am Costa Rica (16:00 UTC)
    - cron: '0 16 * * *'
    # 4pm Costa Rica (22:00 UTC)
    - cron: '0 22 * * *'
  
  # Ejecución manual desde GitHub
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run analysis
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BANKROLL_INICIAL: ${{ secrets.BANKROLL_INICIAL }}
          MONEDA: ${{ secrets.MONEDA }}
          SPORTS: 'soccer_epl,soccer_la_liga,basketball_nba,tennis_atp'
          REGIONS: 'eu,us'
          NODE_ENV: 'production'
        run: node index.js --once

      - name: Upload DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bets-db-${{ github.run_number }}
          path: bets.db
          retention-days: 30
