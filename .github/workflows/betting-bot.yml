name: Betting Bot - EV+ Analysis v3

on:
  schedule:
    # 3 ejecuciones diarias para mejor CLV tracking
    # 8am Costa Rica (14:00 UTC)
    - cron: '0 14 * * *'
    # 1pm Costa Rica (19:00 UTC)
    - cron: '0 19 * * *'
    # 6pm Costa Rica (00:00 UTC día siguiente)
    - cron: '0 0 * * *'
  
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ── PERSISTENCIA: Restaurar BD del cache ──
      - name: Restore database
        id: cache-db
        uses: actions/cache/restore@v4
        with:
          path: bets.db
          key: bets-db-dummy
          restore-keys: bets-db-

      - name: DB status
        run: |
          if [ -f bets.db ]; then
            echo "✅ BD restaurada ($(wc -c < bets.db) bytes)"
          else
            echo "⚠️ BD nueva (primera ejecución)"
          fi

      - name: Install dependencies
        run: npm install

      - name: Run analysis
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BANKROLL_INICIAL: ${{ secrets.BANKROLL_INICIAL }}
          MONEDA: ${{ secrets.MONEDA }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          REGIONS: 'eu,uk'
          NODE_ENV: 'production'
        run: node index.js --once

      # ── PERSISTENCIA: Guardar BD al cache ──
      - name: Save database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: bets.db
          key: bets-db-${{ github.run_id }}

      - name: Upload DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bets-db-${{ github.run_number }}
          path: bets.db
          retention-days: 30
